name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # ---- Rust ----
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ---- Node.js ----
      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src-ui/package-lock.json

      - name: Install npm dependencies
        run: cd src-ui && npm ci

      # ---- Platform dependencies ----
      - name: Install Linux deps (WebViewGTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1

      # ---- Build ----
      - name: Cargo build
        run: cd src-tauri && cargo build --lib

      # ---- Test ----
      - name: Cargo test
        run: cd src-tauri && cargo test --lib

      # ---- Clippy ----
      - name: Cargo clippy
        run: cd src-tauri && cargo clippy --lib -- -D warnings

      # ---- Lint ----
      - name: TypeScript type-check
        run: cd src-ui && npx tsc --noEmit

      - name: ESLint
        run: cd src-ui && npm run lint

  # ============================================================
  # Packaging — only on push to dev branch
  # ============================================================
  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # ---- Rust ----
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ---- Node.js ----
      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src-ui/package-lock.json

      - name: Install npm dependencies
        run: cd src-ui && npm ci

      # ---- Platform packaging dependencies ----
      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1

      - name: Install Windows WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      # ---- Install Tauri CLI ----
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      # ---- Build & Package ----
      - name: Tauri build
        run: cargo tauri build
        env:
          # Skip macOS code signing (CI builds are unsigned)
          APPLE_CERTIFICATE: ""
          APPLE_CERTIFICATE_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: "-"
          APPLE_ID: ""
          APPLE_PASSWORD: ""
          APPLE_TEAM_ID: ""

      # ---- Upload artifacts ----
      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: platinum-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: platinum-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: platinum-windows
          path: src-tauri/target/release/bundle/msi/*.msi
